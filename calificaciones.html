<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calificaciones</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/estilos.css">
</head>

<body>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="form-card p-4 shadow-lg">
        <div class="text-center mb-4">
            <div class="ninja-icon mb-2">🥷</div>
            <h1 class="text-glow">Calificar Juego</h1>
            <p class="text-muted">Comparte tu experiencia con la comunidad</p>
        </div>

        <form>
            <div class="mb-3">
                <label class="form-label text-white-50">Nombre del Videojuego</label>
                <input type="text" class="form-control" placeholder="Ej: Elden Ring, Valorant...">
            </div>

            <div class="mb-4">
                <label class="form-label text-white-50">Tu Puntuación</label>
                <select class="form-select">
                    <option selected disabled>¿Qué te pareció?</option>
                    <option value="5">⭐⭐⭐⭐⭐ (Obra Maestra)</option>
                    <option value="4">⭐⭐⭐⭐ (Muy Bueno)</option>
                    <option value="3">⭐⭐⭐ (Aceptable)</option>
                    <option value="2">⭐⭐ (Malo)</option>
                    <option value="1">⭐ (No lo juegues)</option>
                </select>
            </div>

            <button type="submit" class="btn btn-custom w-100 py-2">
                <span class="btn-text">ENVIAR CALIFICACIÓN</span>
            </button>
        </form>
    </div>
</div>
</body>
</html>
