{% autoescape off %}
<!DOCTYPE html>
<html>
<body style="margin:0; padding:0; font-family: Arial; background:#0f0f0f; color:white;">

<div style="max-width:500px; margin:40px auto; background:#1c1c1c; border-radius:12px; padding:30px; text-align:center;">

    <h1 style="color:#ff4b2b; margin-bottom:10px;">FitLife 💪</h1>

    <p style="font-size:16px;">Hola <strong>{{ user.username }}</strong>,</p>

    <p style="color:#ccc;">
        Recibimos una solicitud para restablecer tu contraseña.
    </p>

    <a href="{{ protocol }}://{{ domain }}{% url 'password_reset_confirm' uidb64=uid token=token %}"
       style="display:inline-block; margin-top:20px; padding:12px 25px; background:#ff4b2b; color:white; text-decoration:none; border-radius:6px; font-weight:bold;">
        🔒 Restablecer contraseña
    </a>

    <p style="margin-top:25px; font-size:13px; color:#888;">
        Si no solicitaste este cambio, puedes ignorar este mensaje.
    </p>

    <hr style="margin:30px 0; border:0; border-top:1px solid #333;">

    <p style="font-size:12px; color:#666;">
        🔥 Entrena fuerte, vive mejor <br>
        Equipo FitLife
    </p>

</div>

</body>
</html>
{% endautoescape %}
