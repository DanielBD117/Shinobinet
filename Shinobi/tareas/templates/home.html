{% extends 'base.html' %}

{% block content %}

<div id="carouselFitLife" class="carousel slide" data-bs-ride="carousel">

    <div class="carousel-inner">

        <!-- Slide 1 -->
        <div class="carousel-item active">
            <img src="https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b" class="d-block w-100">
            <div class="carousel-caption">
                <h1>Transforma tu cuerpo 💪</h1>
                <p>Empieza hoy tu mejor versión</p>
            </div>
        </div>

        <!-- Slide 2 -->
        <div class="carousel-item">
            <img src="https://images.unsplash.com/photo-1558611848-73f7eb4001a1" class="d-block w-100">
            <div class="carousel-caption">
                <h1>Planes personalizados 🔥</h1>
                <p>Rutinas adaptadas a ti</p>
            </div>
        </div>

        <!-- Slide 3 -->
        <div class="carousel-item">
            <img src="https://images.unsplash.com/photo-1599058917212-d750089bc07e" class="d-block w-100">
            <div class="carousel-caption">
                <h1>Entrena como un pro 🏋️</h1>
                <p>Disciplina, fuerza y resultados</p>
            </div>
        </div>

    </div>

    <!-- 🔥 BOTONES LATERALES -->
    <button class="carousel-control-prev" type="button" data-bs-target="#carouselFitLife" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
    </button>

    <button class="carousel-control-next" type="button" data-bs-target="#carouselFitLife" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
    </button>

</div>

{% endblock %}
